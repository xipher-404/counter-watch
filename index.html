<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1320" />
    <title>Counter Watch</title>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-top">
        <button class="brand" type="button" title="Counters">Counter Watch</button>
      </div>
      <nav class="modes" role="tablist" aria-label="App section">
        <button class="mode" type="button" data-mode="counters" role="tab" aria-selected="true">🎯 Counters</button>
        <button class="mode" type="button" data-mode="tiers" role="tab" aria-selected="false">📊 Tier Rankings</button>
      </nav>
      <p class="page-desc"></p>
      <nav class="tabs" role="tablist">
        <button class="tab" data-tab="single" role="tab" aria-selected="true">Single</button>
        <button class="tab" data-tab="team" role="tab" aria-selected="false">Team</button>
        <button class="tab" data-tab="admin" role="tab" aria-selected="false">Admin</button>
      </nav>
    </header>
    <main id="app"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
